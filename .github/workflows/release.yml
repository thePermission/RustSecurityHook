name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: false
            apt: musl-tools
            archive: tar.gz
            bin: rsh
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz
            bin: rsh
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
            bin: rsh
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
            bin: rsh
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
            bin: rsh.exe

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tooling
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        id: package_tar
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.ref }}"
          TARGET="${{ matrix.target }}"
          NAME="rsh-${TAG}-${TARGET}"
          mkdir -p "dist/${NAME}"
          cp "target/${TARGET}/release/${{ matrix.bin }}" "dist/${NAME}/${{ matrix.bin }}"
          tar -C "dist/${NAME}" -czf "dist/${NAME}.tar.gz" "${{ matrix.bin }}"
          echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        id: package_zip
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.ref }}"
          $target = "${{ matrix.target }}"
          $name = "rsh-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/$target/release/${{ matrix.bin }}" "dist/$name/${{ matrix.bin }}"
          Compress-Archive -Path "dist/$name/${{ matrix.bin }}" -DestinationPath "dist/$name.zip" -Force
          "asset=dist/$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          files: |
            ${{ steps.package_tar.outputs.asset }}
            ${{ steps.package_zip.outputs.asset }}
          fail_on_unmatched_files: false
